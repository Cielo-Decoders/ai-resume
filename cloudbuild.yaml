######################################################################
# Google Cloud Build — CareerLab AI (ai-resume)
#
# Deploys two Cloud Run services:
#   1. ai-resume-backend  (FastAPI)
#   2. ai-resume-frontend (React + Nginx)
#
# Required substitution variables (set in Cloud Build trigger UI or CLI):
#   _REGION            GCP region, e.g. us-central1
#   _BACKEND_URL       Full HTTPS URL of the backend Cloud Run service
#                      (leave empty on the very first deploy; fill it in
#                       after the backend service is created and re-run)
#   _FRONTEND_URL      Full HTTPS URL of the frontend Cloud Run service
#                      (used for backend CORS; fill in after first deploy)
#
# Required Secret Manager secrets (create before first run):
#   openai-api-key          → your OPENAI_API_KEY value
#   react-openai-api-key    → your REACT_APP_OPENAI_API_KEY value
#
# One-time setup:
#   gcloud secrets create openai-api-key --data-file=- <<< "sk-proj-..."
#   gcloud secrets create react-openai-api-key --data-file=- <<< "sk-proj-..."
######################################################################

substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: ai-resume-backend
  _FRONTEND_SERVICE: ai-resume-frontend
  _BACKEND_URL: ""       # e.g. https://ai-resume-backend-abc123-uc.a.run.app
  _FRONTEND_URL: ""      # e.g. https://ai-resume-frontend-abc123-uc.a.run.app

steps:
  # ── 1. Build backend image ──────────────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/$_BACKEND_SERVICE:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/$_BACKEND_SERVICE:latest
      - ./server

  # ── 2. Push backend image ───────────────────────────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/$_BACKEND_SERVICE
    waitFor: [build-backend]

  # ── 3. Deploy backend to Cloud Run ─────────────────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_BACKEND_SERVICE
      - --image=gcr.io/$PROJECT_ID/$_BACKEND_SERVICE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-env-vars=HOST=0.0.0.0,PORT=8080,DEBUG=False,ALLOWED_ORIGINS=$_FRONTEND_URL
      - --set-secrets=OPENAI_API_KEY=openai-api-key:latest
    waitFor: [push-backend]

  # ── 4. Build frontend image ─────────────────────────────────────────────────
  #    REACT_APP_* vars are baked into the bundle at build time.
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE:latest
      - --build-arg
      - REACT_APP_API_URL=$_BACKEND_URL
      - --build-arg
      - REACT_APP_OPENAI_API_KEY=$$REACT_OPENAI_KEY
      - ./client
    secretEnv: [REACT_OPENAI_KEY]
    waitFor: [deploy-backend]

  # ── 5. Push frontend image ──────────────────────────────────────────────────
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE
    waitFor: [build-frontend]

  # ── 6. Deploy frontend to Cloud Run ────────────────────────────────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_FRONTEND_SERVICE
      - --image=gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
    waitFor: [push-frontend]

# Secret Manager bindings (Cloud Build service account needs secretAccessor role)
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/react-openai-api-key/versions/latest
      env: REACT_OPENAI_KEY

images:
  - gcr.io/$PROJECT_ID/$_BACKEND_SERVICE:$SHORT_SHA
  - gcr.io/$PROJECT_ID/$_BACKEND_SERVICE:latest
  - gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE:$SHORT_SHA
  - gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE:latest

options:
  logging: CLOUD_LOGGING_ONLY
