server {
    # Cloud Run sends traffic to port 8080
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # React SPA: route all requests to index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; React adds content hashes to filenames
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Do not cache index.html so the browser always gets the latest shell
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
